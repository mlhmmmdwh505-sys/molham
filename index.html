<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📖</text></svg>">
    <meta name="google-site-verification" content="zTFBE1PBvuWcR2F9TmV3Y5NEpOiBw5Ehu0gFfzFi2Y0" />
    <meta property="og:site_name" content="D.MOLHAM Surgeon Dashboard">
    <meta name="keywords" content="ملهم ممدوح, molham, github pages, موقع ملهم">
    <meta name="description" content="هذا الموقع جميل و مثالي للدراسة و العمل و جميع المهام موقع ملهم هو اداة تنظيم و ترتيب و زيادة الانتاجية مصمم من قبل ملهم.">
    <meta name="verifywebsiteownership" content="tgf8hWSVWpGMEXVmzfc2SXcru"/>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surgeon Dashboard D.MOLHAM❤️</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="glass-card">
        <div class="mini-score">
            <span>💰 <span id="userPoints">0</span></span>
            <button onclick="resetPoints()" class="reset-mini" title="تصفير النقاط">🗑️</button>
        </div>

        <div class="date-tag" id="dateDisplay"></div>

<header>
    <h1>لوحة تحكم د. ملهم ممدوح 🩺</h1>
    <p class="welcome-msg">مرحباً بك، دكتور ملهم ✨</p>
    <p id="motivationQuote" style="color: var(--primary); font-style: italic; margin-top: 10px; min-height: 24px;"></p>
   <div class="settings-bar card">
    <div class="setting-item">
        <label>اللون</label>
        <input type="color" id="colorPicker" value="#6366f1">
    </div>
    <div class="setting-item">
        <label>التاريخ</label>
        <input type="date" id="gradDateInput">
    </div>
    <div class="setting-item">
        <label>الدقائق</label>
        <input type="number" id="minsInput" value="25" class="num-input">
    </div>
    <button class="btn-save" id="mainSaveBtn">تأكيد الإعدادات</button>
</div>
</header>

        <div class="dashboard-grid">
            <aside class="side-col">
                <section class="info-card">
                    <h3>⏳ حلم التخرج</h3>
                    <div id="countdown" class="modern-timer">
                        <div class="unit"><span id="years">00</span><label>سنة</label></div>
                        <div class="unit"><span id="days">00</span><label>يوم</label></div>
                        <div class="unit"><span id="hours">00</span><label>ساعة</label></div>
                    </div>
                </section>

                <section class="info-card store-card">
                    <h3>☕ متجر الطاقة (1د = 15ن)</h3>
                    <div class="store-grid">
                        <div class="item" onclick="buyBreak(5)">5 د =<small>75ن</small></div>
                        <div class="item" onclick="buyBreak(10)">10 د =<small>150ن</small></div>
                        <div class="item" onclick="buyBreak(15)">15 د =<small>225ن</small></div>
                    </div>
                </section>
            </aside>

            <main class="main-col">
                <section class="info-card focus-card">
                    <div id="pomoDisplay">25:00</div>
                    <div class="pomo-actions">
                       <button onclick="toggleTimer()" id="startBtn" class="btn-main">ابدأ المهمة</button>
                        <button onclick="resetTimer()">إعادة ضبط</button>
                    </div>
                </section>

                <section class="info-card tasks-card">
                    <div class="input-section">
                        <input type="text" id="taskInput" placeholder="أضف مهمة طبية جديدة (عملية، مراجعة)...">
                        <button onclick="addTask()" class="btn-add">+</button>
                    </div>
                    <ul id="taskList" class="custom-scroll"></ul>
                </section>
            </main>
        </div>
    </div>
    <audio id="alarmSound" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" preload="auto"></audio>
    <script src="script.js"></script>
</body>
</html>
