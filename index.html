<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة تحكم دكتور ملهم</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1 id="welcomeTitle">لوحة تحكم د. ملهم 🩺</h1>
        
        <p id="welcomeText">مرحباً بك، دكتور <span id="displayUserName">ملهم</span> ✨</p>

        <div class="stats-bar">
            <div class="stat-item">💰 النقاط: <span id="userPoints">0</span></div>
            <div id="dateDisplay"></div>
        </div>

        <div class="main-card">
            <div class="timer-section">
                <div id="pomoDisplay" class="timer-display">25:00</div>
                <div class="controls">
                    <button id="startBtn" onclick="toggleTimer()">ابدأ المهمة</button>
                    <button onclick="resetTimer()">إعادة ضبط</button>
                </div>
            </div>

            <div class="settings-grid">
                <div class="setting-item">
                    <label>اسم الدكتور:</label>
                    <input type="text" id="userNameInput" placeholder="اكتب اسمك هنا">
                </div>
                <div class="setting-item">
                    <label>الدقائق:</label>
                    <input type="number" id="minsInput" value="25" step="0.1">
                </div>
                <div class="setting-item">
                    <label>تاريخ التخرج:</label>
                    <input type="date" id="gradDateInput">
                </div>
                <div class="setting-item">
                    <label>اللون:</label>
                    <input type="color" id="colorPicker" value="#6366f1">
                </div>
                <button id="mainSaveBtn" class="save-btn">تأكيد الإعدادات ✅</button>
            </div>
        </div>

        <div class="shop-section">
            <h3>المتجر 🛒</h3>
            <div class="shop-buttons">
                <button onclick="buyBreak(5)">استراحة 5 دقائق (75 نقطة)</button>
                <button onclick="resetPoints()" class="reset-btn">تصفير النقاط 🗑️</button>
            </div>
        </div>

        <p id="motivationQuote" class="quote"></p>
    </div>

    <script src="script.js"></script>
</body>
</html>
