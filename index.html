<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم الجراح | د. ملهم</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard">
        <header>
            <div class="date-now">الإثنين، 20 أبريل</div>
            <div class="coins-display">
                <button id="resetPointsBtn">🗑️</button>
                <span id="coinCount">0</span>
                <img src="https://cdn-icons-png.flaticon.com/512/2489/2489756.png" width="20">
            </div>
        </header>

        <h1 class="title">🩺 لوحة تحكم الجراح</h1>

        <div class="main-grid">
            <div class="card timer-card">
                <h2 id="pomoDisplay">25:00</h2>
                <div class="controls">
                    <button id="startBtn" class="btn-p">ابدأ المهمة</button>
                    <button id="resetBtn" class="btn-s">إعادة ضبط</button>
                </div>
            </div>

            <div class="card grad-card">
                <h3>⌛ حلم التخرج</h3>
                <div class="countdown">
                    <div class="unit"><span id="years">00</span><small>سنة</small></div>
                    <div class="unit"><span id="days">00</span><small>يوم</small></div>
                    <div class="unit"><span id="hours">00</span><small>ساعة</small></div>
                </div>
            </div>

            <div class="card task-card">
                <div class="task-input">
                    <button id="addTaskBtn">+</button>
                    <input type="text" id="taskInput" placeholder="أضف مهمة طبية جديدة...">
                </div>
                <ul id="taskList"></ul>
            </div>

            <div class="card shop-card">
                <h3>☕ متجر الطاقة (1د = 15ن)</h3>
                <div class="shop-grid">
                    <button class="buy-btn" data-mins="5">5 دق 75ن</button>
                    <button class="buy-btn" data-mins="10">10 دق 150ن</button>
                    <button class="buy-btn" data-mins="15">15 دق 225ن</button>
                </div>
            </div>
        </div>

        <div class="settings card">
            <div class="s-group">
                <label>اللون</label>
                <input type="color" id="colorPicker">
            </div>
            <div class="s-group">
                <label>التاريخ</label>
                <input type="date" id="gradDateInput">
            </div>
            <div class="s-group">
                <label>الدقائق</label>
                <input type="number" id="minsInput" value="25">
            </div>
            <button id="saveConfigBtn">تأكيد الإعدادات 🩺</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
